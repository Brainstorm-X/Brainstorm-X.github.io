<script>
if (window.location.pathname === '/' && !sessionStorage.getItem('hasRedirected')) {
    // 第一步：先永久保存"已跳转"标记
    sessionStorage.setItem('hasRedirected', 'true');
    
    // 第二步：延迟100ms跳转，给浏览器足够时间保存标记
    setTimeout(() => {
        window.location.replace('/Home/'); // 用replace比href更干净，不会留下历史记录
    }, 100);
}
</script>
